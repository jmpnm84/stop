<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#ffdc00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Custom Dimensions: 14cm x 19.5cm */
        .a5-container {
            width: 14cm;
            height: 19.5cm;
            background-color: #ffffff;
            border: 8px solid #ffdc00;
            padding: 12mm 8mm;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }
        
        /* Logo Header Area */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 6mm;
        }
        .logo-image {
            height: 45px; /* Altura ideal para o topo do enquadramento */
            max-width: 100%;
            object-fit: contain;
        }

        /* STOP Box */
        .stop-box {
            border: 2px dashed #333333;
            padding: 12px;
            text-align: center;
            margin: 0 auto 8mm auto;
            width: 85%;
        }
        .stop-sign {
            width: 70px;
            height: 70px;
            background-color: #7f7f7f;
            position: relative;
            margin: 0 auto 8px auto;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #ffffff;
            outline: 2px solid #7f7f7f;
        }
        .stop-text {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nao-usar {
            color: #d61c1c;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 3px 0 0 0;
        }

        /* Form Fields Layout */
        .form-group {
            display: flex;
            align-items: flex-end;
            margin-bottom: 5mm;
            width: 100%;
        }
        .form-label {
            font-size: 14px;
            font-weight: normal;
            color: #000000;
            white-space: nowrap;
            margin-right: 8px;
            padding-bottom: 2px;
        }
        .form-input {
            flex-grow: 1;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 14px;
            padding: 1px 5px;
            background: transparent;
            outline: none;
            color: #333333;
        }
        .form-input:focus {
            background-color: #fffde7;
        }
        
        /* Quantity and Date Alignment */
        .form-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 5mm;
        }
        .form-row .form-group {
            margin-bottom: 0;
        }
        .form-row .form-group:first-child {
            width: 55%;
        }
        .form-row .form-group:last-child {
            width: 40%;
        }

        /* Textareas */
        .form-block {
            display: flex;
            flex-direction: column;
            margin-bottom: 5mm;
        }
        .form-block.expandable {
            flex-grow: 1;
        }
        .form-block .form-label {
            margin-bottom: 4px;
        }
        .form-textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            background: transparent;
            padding: 1px 5px;
        }
        
        /* Floating Digital Control Buttons */
        .actions {
            position: absolute;
            top: 12mm;
            right: 8mm;
            display: flex;
            gap: 8px;
        }
        .btn {
            background-color: #034263;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-clear {
            background-color: #d61c1c;
        }
        
        /* Print Styles */
        @media print {
            body {
                background-color: #ffffff;
            }
            .a5-container {
                box-shadow: none;
                border: 8px solid #ffdc00 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .actions {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="a5-container">
        <!-- Digital Management Action Buttons -->
        <div class="actions">
            <button class="btn btn-clear" onclick="clearForm()">Limpar</button>
            <button class="btn" onclick="window.print()">Imprimir / PDF</button>
        </div>

        <!-- Header with the New Logo Link -->
        <div class="header">
            <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
        </div>

        <!-- STOP Section -->
        <div class="stop-box">
            <div class="stop-sign">
                <span class="stop-text">STOP</span>
            </div>
            <div class="nao-usar">NÃO USAR</div>
        </div>

        <!-- Preenchíveis -->
        <div class="form-group">
            <label class="form-label">Ref.:</label>
            <input type="text" id="ref" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Peças:</label>
            <input type="text" id="pecas" class="form-input">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Quantidade:</label>
                <input type="text" id="quantidade" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Data:</label>
                <input type="date" id="data" class="form-input">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Responsável:</label>
            <input type="text" id="responsavel" class="form-input">
        </div>

        <div class="form-block">
            <label class="form-label">Motivo:</label>
            <textarea id="motivo" class="form-textarea" rows="2"></textarea>
        </div>

        <div class="form-block expandable">
            <label class="form-label">Observações:</label>
            <textarea id="observacoes" class="form-textarea" style="flex-grow: 1; min-height: 40px;"></textarea>
        </div>
    </div>

    <script>
        // Form field persistence setup
        const fields = ['ref', 'pecas', 'quantidade', 'data', 'responsavel', 'motivo', 'observacoes'];
        
        window.addEventListener('load', () => {
            // Load saved data
            fields.forEach(fieldId => {
                const savedValue = localStorage.getItem(fieldId);
                if (savedValue) {
                    document.getElementById(fieldId).value = savedValue;
                }
                
                // Track typing to save instantly
                document.getElementById(fieldId).addEventListener('input', (e) => {
                    localStorage.setItem(fieldId, e.target.value);
                });
            });
            
            // Put current date if blank
            const dateField = document.getElementById('data');
            if (!dateField.value) {
                const today = new Date().toISOString().split('T')[0];
                dateField.value = today;
                localStorage.setItem('data', today);
            }
        });

        function clearForm() {
            if(confirm("Tem a certeza que deseja limpar todos os campos?")) {
                fields.forEach(fieldId => {
                    document.getElementById(fieldId).value = '';
                    localStorage.removeItem(fieldId);
                });
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('data').value = today;
                localStorage.setItem('data', today);
            }
        }

        // Integrated Service Worker inline loader for PWA conversion
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'trigo-stop-14x19-v2';
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['.'])));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(caches.match(e.request).then(response => response || fetch(e.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
