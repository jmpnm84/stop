<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP v3.2.5</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffdc00">

    <link rel="manifest" href="manifest.json">

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 15px 10px; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; overflow-x: hidden; }
        
        .actions { margin-bottom: 20px; display: flex; gap: 10px; width: 100%; max-width: 14cm; }
        .btn { background-color: #034263; color: white; border: none; padding: 14px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: background-color 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-clear { background-color: #d61c1c; }
        .btn-sync { background-color: #2196F3; }

        .print-page { display: flex; gap: 10mm; justify-content: center; align-items: center; width: 100%; background-color: transparent; }

        .a5-container { width: 14cm; max-width: 100%; height: 19.5cm; background-color: #ffffff; border: 8px solid #ffdc00; padding: 8mm 7mm; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        
        /* ADAPTAÇÃO PARA TABLET EM PORTRAIT */
        @media screen and (max-width: 768px) {
            .a5-container { width: 95% !important; height: auto; min-height: 19.5cm; }
            .print-page { flex-direction: column; }
        }
        
        .clone-block { display: none; }
        
        .header { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 6mm; }
        .logo-image { height: 42px; max-width: 100%; object-fit: contain; }

        .stop-box { border: 2px dashed #333333; padding: 15px; text-align: center; margin: 0 auto 8mm auto; width: 100%; max-width: 9.5cm; height: 5.2cm; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .stop-sign { width: 75px; height: 75px; background-color: #7f7f7f; position: relative; margin: 0 auto 10px auto; clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); display: flex; justify-content: center; align-items: center; border: 3px solid #ffffff; outline: 2px solid #7f7f7f; flex-shrink: 0; }
        .stop-text { color: #ffffff; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .nao-usar { color: #d61c1c; font-size: 19px; font-weight: bold; letter-spacing: 1px; margin: 5px 0 0 0; }

        .form-group-inline { display: flex; align-items: flex-end; margin-bottom: 4.5mm; width: 100%; }
        .form-group-inline .form-label { font-size: 14px; color: #000000; white-space: nowrap; margin-right: 6px; margin-bottom: 2px; }
        .form-group-inline .form-input { flex-grow: 1; border: none; border-bottom: 1px solid #000000; font-size: 14px; padding: 2px 5px; background: transparent; outline: none; color: #333333; text-align: center; }
        
        .form-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 4.5mm; gap: 15px; }
        .form-row .form-group-inline:first-child { width: 55%; }
        .form-row .form-group-inline:last-child { width: 45%; }

        .form-group-block { display: flex; flex-direction: column; margin-bottom: 4.5mm; width: 100%; }
        .form-group-block .form-label { font-size: 14px; color: #000000; margin-bottom: 6px; }
        .form-group-block .form-textarea { width: 100%; border: none; border-bottom: 1px solid #000000; font-size: 14px; line-height: 1.4; resize: none; outline: none; background: transparent; padding: 2px 0; text-align: center; }

        #motivo_1, #motivo_2 { color: #d61c1c; font-weight: bold; font-size: 22px; transition: font-size 0.1s ease; }
        .observacoes-wrapper { margin-top: auto; margin-bottom: 5mm; }
        
        @media print {
            @page { size: A4 landscape; margin: 0mm !important; }
            body { width: 297mm !important; height: 210mm !important; margin: 0mm !important; padding: 0mm !important; background-color: #ffffff !important; }
            .actions { display: none !important; }
            .print-page { display: flex !important; justify-content: center !important; width: 297mm !important; height: 210mm !important; flex-direction: row !important; }
            .a5-container { box-shadow: none !important; width: 135mm !important; height: 190mm !important; border: 7px solid #ffdc00 !important; }
            .clone-block { display: flex !important; }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn btn-clear" onclick="clearForm()">Limpar Campos</button>
        <button class="btn btn-sync" id="btnSync" onclick="importarDoDrive()">Sincronizar</button>
        <button class="btn" onclick="window.print()">Imprimir (Impressora)</button>
    </div>

    <datalist id="listaReferencias"></datalist>

    <div class="print-page">
        <div class="a5-container" id="bloco1">
            <div class="header"><img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image"></div>
            <div class="stop-box"><div class="stop-sign"><span class="stop-text">STOP</span></div><div class="nao-usar">NÃO USAR</div></div>
            <div class="form-group-inline"><label class="form-label">Ref.:</label><input type="text" id="ref_1" class="form-input" list="listaReferencias" autocomplete="off"></div>
            <div class="form-group-inline"><label class="form-label">Peças:</label><input type="text" id="pecas_1" class="form-input"></div>
            <div class="form-row">
                <div class="form-group-inline"><label class="form-label">Qtd:</label><input type="text" id="quantidade_1" class="form-input"></div>
                <div class="form-group-inline"><label class="form-label">Data:</label><input type="text" id="data_1" class="form-input" placeholder="DD/MM/AAAA" maxlength="10"></div>
            </div>
            <div class="form-group-inline"><label class="form-label">Resp.:</label><input type="text" id="responsavel_1" class="form-input"></div>
            <div class="form-group-block"><label class="form-label">Motivo:</label><textarea id="motivo_1" class="form-textarea" style="min-height: 45px;"></textarea></div>
            <div class="form-group-block observacoes-wrapper"><label class="form-label">Obs.:</label><textarea id="observacoes_1" class="form-textarea" style="min-height: 45px;"></textarea></div>
        </div>

        <div class="a5-container clone-block" id="bloco2">
            <div class="header"><img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image"></div>
            <div class="stop-box"><div class="stop-sign"><span class="stop-text">STOP</span></div><div class="nao-usar">NÃO USAR</div></div>
            <div class="form-group-inline"><label class="form-label">Ref.:</label><input type="text" id="ref_2" class="form-input" list="listaReferencias" autocomplete="off"></div>
            <div class="form-group-inline"><label class="form-label">Peças:</label><input type="text" id="pecas_2" class="form-input"></div>
            <div class="form-row">
                <div class="form-group-inline"><label class="form-label">Qtd:</label><input type="text" id="quantidade_2" class="form-input"></div>
                <div class="form-group-inline"><label class="form-label">Data:</label><input type="text" id="data_2" class="form-input" placeholder="DD/MM/AAAA" maxlength="10"></div>
            </div>
            <div class="form-group-inline"><label class="form-label">Resp.:</label><input type="text" id="responsavel_2" class="form-input"></div>
            <div class="form-group-block"><label class="form-label">Motivo:</label><textarea id="motivo_2" class="form-textarea" style="min-height: 45px;"></textarea></div>
            <div class="form-group-block observacoes-wrapper"><label class="form-label">Obs.:</label><textarea id="observacoes_2" class="form-textarea" style="min-height: 45px;"></textarea></div>
        </div>
    </div>

    <script>
        const baseFields = ['ref', 'pecas', 'quantidade', 'data', 'responsavel', 'motivo', 'observacoes'];
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfoytX-8eOYURVuGhqgUX6CcTko4k8mFZ8i_dqD51nIbsP_KDK5gmT3lcaIx6V3mg/exec";

        function formatarData(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v.length > 8) v = v.substring(0, 8);
            if (v.length > 4) v = v.replace(/^(\d{2})(\d{2})(\d{4})$/, '$1/$2/$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,2})$/, '$1/$2');
            return v;
        }

        function ajustarTamanhoFonteMotivo(texto) {
            const tamanho = texto.length > 60 ? 12 : texto.length > 45 ? 14 : texto.length > 30 ? 16 : texto.length > 15 ? 19 : 22;
            document.getElementById('motivo_1').style.fontSize = tamanho + "px";
            document.getElementById('motivo_2').style.fontSize = tamanho + "px";
        }

        window.addEventListener('load', () => {
            baseFields.forEach(fieldId => {
                const savedValue = localStorage.getItem(fieldId);
                [1, 2].forEach(num => {
                    const el = document.getElementById(`${fieldId}_${num}`);
                    if (savedValue) el.value = savedValue;
                    el.addEventListener('input', (e) => {
                        let val = e.target.value;
                        if (fieldId === 'data') val = formatarData(e.target);
                        localStorage.setItem(fieldId, val);
                        document.getElementById(`${fieldId}_${num === 1 ? 2 : 1}`).value = val;
                        if (fieldId === 'motivo') ajustarTamanhoFonteMotivo(val);
                    });
                });
            });
        });

        function clearForm() {
            if(confirm("Limpar todos os campos?")) {
                baseFields.forEach(fieldId => {
                    localStorage.removeItem(fieldId);
                    document.getElementById(`${fieldId}_1`).value = '';
                    document.getElementById(`${fieldId}_2`).value = '';
                });
                document.getElementById('responsavel_1').value = "SQF";
                document.getElementById('responsavel_2').value = "SQF";
                localStorage.setItem('responsavel', "SQF");
                ajustarTamanhoFonteMotivo('');
            }
        }

        async function importarDoDrive() {
            const btn = document.getElementById('btnSync');
            btn.textContent = "A sincronizar...";
            try {
                const response = await fetch(SCRIPT_URL);
                const dados = await response.json();
                const dl = document.getElementById('listaReferencias');
                dl.innerHTML = '';
                dados.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.referencia;
                    opt.textContent = item.nomePeca;
                    dl.appendChild(opt);
                });
                alert("Sincronizado!");
            } catch (err) { alert("Erro na sincronização."); }
            btn.textContent = "Sincronizar";
        }
    </script>
</body>
</html>
