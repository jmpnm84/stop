<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP v3.2.4</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffdc00">

    <link rel="manifest" href="manifest.json">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 15px 10px;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }
        
        .actions {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 14cm;
        }
        .btn {
            background-color: #034263;
            color: white;
            border: none;
            padding: 14px 10px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-clear { background-color: #d61c1c; }
        .btn-sync { background-color: #2196F3; }

        .print-page {
            display: flex;
            gap: 10mm;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: transparent;
        }

        .a5-container {
            width: 14cm;
            max-width: 100%;
            height: 19.5cm;
            background-color: #ffffff;
            border: 8px solid #ffdc00;
            padding: 8mm 7mm;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }
        
        .clone-block { display: none; }
        
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 6mm;
        }
        .logo-image {
            height: 42px;
            max-width: 100%;
            object-fit: contain;
        }

        .stop-box {
            border: 2px dashed #333333;
            padding: 15px;
            text-align: center;
            margin: 0 auto 8mm auto;
            width: 100%;
            max-width: 9.5cm;
            height: 5.2cm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .stop-sign {
            width: 75px;
            height: 75px;
            background-color: #7f7f7f;
            position: relative;
            margin: 0 auto 10px auto;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #ffffff;
            outline: 2px solid #7f7f7f;
            flex-shrink: 0;
        }
        .stop-text {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nao-usar {
            color: #d61c1c;
            font-size: 19px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 5px 0 0 0;
        }

        .form-group-inline {
            display: flex;
            align-items: flex-end;
            margin-bottom: 4.5mm;
            width: 100%;
        }
        .form-group-inline .form-label {
            font-size: 14px;
            font-weight: normal;
            color: #000000;
            white-space: nowrap;
            margin-right: 6px;
            margin-bottom: 2px;
        }
        .form-group-inline .form-input {
            flex-grow: 1;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 14px;
            padding: 2px 5px;
            background: transparent;
            outline: none;
            color: #333333;
            text-align: center;
        }
        
        .form-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 4.5mm;
            gap: 15px;
        }
        .form-row .form-group-inline {
            margin-bottom: 0;
        }
        .form-row .form-group-inline:first-child { width: 55%; }
        .form-row .form-group-inline:last-child { width: 45%; }

        .form-group-block {
            display: flex;
            flex-direction: column;
            margin-bottom: 4.5mm;
            width: 100%;
        }
        .form-group-block .form-label {
            font-size: 14px;
            font-weight: normal;
            color: #000000;
            margin-bottom: 6px;
        }
        .form-group-block .form-textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 14px;
            line-height: 1.4;
            resize: none;
            outline: none;
            background: transparent;
            padding: 2px 0;
            text-align: center;
        }

        /* O tamanho base do motivo passa a ser gerido por JS, removemos o clamp fixo */
        #motivo_1, #motivo_2 {
            color: #d61c1c;
            font-weight: bold;
            font-size: 22px; 
            transition: font-size 0.1s ease;
        }
        
        .observacoes-wrapper {
            margin-top: auto; 
            margin-bottom: 5mm;
        }
        
        @media print {
            @page {
                size: A4 landscape;
                margin: 0mm !important;
            }
            html, body {
                width: 297mm !important;
                height: 210mm !important;
                margin: 0mm !important;
                padding: 0mm !important;
                background-color: #ffffff !important;
                overflow: hidden !important;
                display: block !important;
            }
            .actions {
                display: none !important;
            }
            .print-page {
                display: flex !important; 
                justify-content: center !important;
                align-items: center !important;
                width: 297mm !important;
                height: 210mm !important;
                margin: 0 !important;
                padding: 5mm !important; 
                box-sizing: border-box !important;
                white-space: normal !important;
            }
            .a5-container {
                box-shadow: none !important;
                box-sizing: border-box !important;
                display: flex !important; 
                flex-direction: column !important;
                width: 135mm !important; 
                max-width: 135mm !important;
                height: 190mm !important;      
                max-height: 190mm !important;
                border: 7px solid #ffdc00 !important;
                padding: 5mm 5mm !important;
                margin: 0 3mm !important; 
                vertical-align: top !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            .clone-block { display: flex !important; }
            .header { margin-bottom: 3mm; }
            .stop-box { height: 4.2cm; margin-bottom: 4mm; }
            .form-group-inline { margin-bottom: 3mm; }
            .form-row { margin-bottom: 3mm; }
            .form-group-block { margin-bottom: 3mm; }
            .observacoes-wrapper { margin-bottom: 2mm; }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn btn-clear" onclick="clearForm()">Limpar Campos</button>
        <button class="btn btn-sync" id="btnSync" onclick="importarDoDrive()">Sincronizar</button>
        <button class="btn" onclick="window.print()">Imprimir (Impressora)</button>
    </div>

    <datalist id="listaReferencias"></datalist>

    <div class="print-page">
        <div class="a5-container">
            <div class="header">
                <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
            </div>
            <div class="stop-box">
                <div class="stop-sign"><span class="stop-text">STOP</span></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            
            <div class="form-group-inline">
                <label class="form-label" for="ref_1">Ref.:</label>
                <input type="text" id="ref_1" class="form-input" list="listaReferencias" autocomplete="off" placeholder="Digite para pesquisar...">
            </div>
            
            <div class="form-group-inline">
                <label class="form-label" for="pecas_1">Peças:</label>
                <input type="text" id="pecas_1" class="form-input">
            </div>
            
            <div class="form-row">
                <div class="form-group-inline">
                    <label class="form-label" for="quantidade_1">Quantidade:</label>
                    <input type="text" id="quantidade_1" class="form-input">
                </div>
                <div class="form-group-inline">
                    <label class="form-label" for="data_1">Data:</label>
                    <input type="text" id="data_1" class="form-input" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            
            <div class="form-group-inline">
                <label class="form-label" for="responsavel_1">Responsável:</label>
                <input type="text" id="responsavel_1" class="form-input">
            </div>
            
            <div class="form-group-block">
                <label class="form-label" for="motivo_1">Motivo:</label>
                <textarea id="motivo_1" class="form-textarea" style="min-height: 45px;"></textarea>
            </div>
            
            <div class="form-group-block observacoes-wrapper">
                <label class="form-label" for="observacoes_1">Observações:</label>
                <textarea id="observacoes_1" class="form-textarea" style="min-height: 45px;"></textarea>
            </div>
        </div>

        <div class="a5-container clone-block">
            <div class="header">
                <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
            </div>
            <div class="stop-box">
                <div class="stop-sign"><span class="stop-text">STOP</span></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            
            <div class="form-group-inline">
                <label class="form-label" for="ref_2">Ref.:</label>
                <input type="text" id="ref_2" class="form-input" list="listaReferencias" autocomplete="off" placeholder="Digite para pesquisar...">
            </div>
            
            <div class="form-group-inline">
                <label class="form-label" for="pecas_2">Peças:</label>
                <input type="text" id="pecas_2" class="form-input">
            </div>
            
            <div class="form-row">
                <div class="form-group-inline">
                    <label class="form-label" for="quantidade_2">Quantidade:</label>
                    <input type="text" id="quantidade_2" class="form-input">
                </div>
                <div class="form-group-inline">
                    <label class="form-label" for="data_2">Data:</label>
                    <input type="text" id="data_2" class="form-input" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            
            <div class="form-group-inline">
                <label class="form-label" for="responsavel_2">Responsável:</label>
                <input type="text" id="responsavel_2" class="form-input">
            </div>
            
            <div class="form-group-block">
                <label class="form-label" for="motivo_2">Motivo:</label>
                <textarea id="motivo_2" class="form-textarea" style="min-height: 45px;"></textarea>
            </div>
            
            <div class="form-group-block observacoes-wrapper">
                <label class="form-label" for="observacoes_2">Observações:</label>
                <textarea id="observacoes_2" class="form-textarea" style="min-height: 45px;"></textarea>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registado com sucesso.'))
                    .catch(err => console.log('Erro ao registar o ficheiro sw.js:', err));
            });
        }

        let mapaProdutos = [];
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfoytX-8eOYURVuGhqgUX6CcTko4k8mFZ8i_dqD51nIbsP_KDK5gmT3lcaIx6V3mg/exec";
        const baseFields = ['ref', 'pecas', 'quantidade', 'data', 'responsavel', 'motivo', 'observacoes'];

        const DB_NAME = 'TrigoStopDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'referencias';

        function abrirDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'referencia' });
                    }
                };
            });
        }

        async function guardarNoIndexedDB(dados) {
            const db = await abrirDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.clear();
            dados.forEach(item => store.put(item));
            return tx.complete;
        }

        async function lerDoIndexedDB() {
            const db = await abrirDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        function formatarData(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v.length > 8) v = v.substring(0, 8);
            if (v.length > 4) {
                v = v.replace(/^(\d{2})(\d{2})(\d{4})$/, '$1/$2/$3');
            } else if (v.length > 2) {
                v = v.replace(/^(\d{2})(\d{1,2})$/, '$1/$2');
            }
            return v;
        }

        function verificarFiltroReferencia(valorDigitado) {
            const correspondencia = mapaProdutos.find(p => p.referencia === valorDigitado);
            if (correspondencia) {
                document.getElementById('pecas_1').value = correspondencia.nomePeca;
                document.getElementById('pecas_2').value = correspondencia.nomePeca;
                localStorage.setItem('pecas', correspondencia.nomePeca);
            }
        }

        // FUNÇÃO PARA REDUZIR O TAMANHO DO TEXTO DINAMICAMENTE
        function ajustarTamanhoFonteMotivo(texto) {
            const comprimento = texto.length;
            let tamanho = 22; // Tamanho padrão inicial (grande)

            if (comprimento > 60) {
                tamanho = 12;
            } else if (comprimento > 45) {
                tamanho = 14;
            } else if (comprimento > 30) {
                tamanho = 16;
            } else if (comprimento > 15) {
                tamanho = 19;
            }

            document.getElementById('motivo_1').style.fontSize = tamanho + "px";
            document.getElementById('motivo_2').style.fontSize = tamanho + "px";
        }

        window.addEventListener('load', async () => {
            try {
                const dadosLocais = await lerDoIndexedDB();
                if (dadosLocais && dadosLocais.length > 0) {
                    carregarDatalist(dadosLocais);
                } else {
                    carregarDadosViaFetch();
                }
            } catch (e) {
                carregarDadosViaFetch();
            }

            baseFields.forEach(fieldId => {
                const savedValue = localStorage.getItem(fieldId);
                [1, 2].forEach(num => {
                    const el = document.getElementById(`${fieldId}_${num}`);
                    if (savedValue) el.value = savedValue;
                    
                    el.addEventListener('input', (e) => {
                        let val = e.target.value;
                        if (fieldId === 'data') {
                            val = formatarData(e.target);
                            e.target.value = val;
                        }
                        
                        localStorage.setItem(fieldId, val);
                        const otherNum = num === 1 ? 2 : 1;
                        const targetOther = document.getElementById(`${fieldId}_${otherNum}`);
                        if (targetOther) targetOther.value = val;

                        if (fieldId === 'ref') {
                            verificarFiltroReferencia(val);
                        }

                        // Dispara a mudança de tamanho ao digitar no motivo
                        if (fieldId === 'motivo') {
                            ajustarTamanhoFonteMotivo(val);
                        }
                    });
                });
            });
            
            const date1 = document.getElementById('data_1');
            if (!date1.value) {
                const hoje = new Date();
                const dd = String(hoje.getDate()).padStart(2, '0');
                const mm = String(hoje.getMonth() + 1).padStart(2, '0');
                const aaaa = hoje.getFullYear();
                const dataFormatada = `${dd}/${mm}/${aaaa}`;
                document.getElementById('data_1').value = dataFormatada;
                document.getElementById('data_2').value = dataFormatada;
                localStorage.setItem('data', dataFormatada);
            }

            const resp1 = document.getElementById('responsavel_1');
            if (!resp1.value) {
                document.getElementById('responsavel_1').value = "SQF";
                document.getElementById('responsavel_2').value = "SQF";
                localStorage.setItem('responsavel', "SQF");
            }

            // Garante o tamanho correto ao carregar texto guardado no LocalStorage
            const motivoGuardado = localStorage.getItem('motivo');
            if (motivoGuardado) {
                ajustarTamanhoFonteMotivo(motivoGuardado);
            }
        });

        function carregarDadosViaFetch() {
            return fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(dados => {
                    carregarDatalist(dados);
                    guardarNoIndexedDB(dados);
                    return dados;
                })
                .catch(err => console.log("Erro ao carregar via Fetch: ", err));
        }

        async function importarDoDrive() {
            const btn = document.getElementById('btnSync');
            btn.disabled = true;
            btn.textContent = "A sincronizar...";
            
            try {
                await carregarDadosViaFetch();
                alert("Referências sincronizadas com sucesso!");
            } catch (err) {
                alert("Erro ao sincronizar.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Sincronizar";
            }
        }

        function carregarDatalist(dados) {
            mapaProdutos = dados;
            const dl = document.getElementById('listaReferencias');
            dl.innerHTML = ''; 

            dados.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.referencia;
                opt.textContent = item.nomePeca; 
                dl.appendChild(opt);
            });
        }

        function clearForm() {
            if(confirm("Tem a certeza que deseja limpar todos os campos?")) {
                baseFields.forEach(fieldId => {
                    localStorage.removeItem(fieldId);
                    document.getElementById(`${fieldId}_1`).value = '';
                    document.getElementById(`${fieldId}_2`).value = '';
                });
                
                const hoje = new Date();
                const dd = String(hoje.getDate()).padStart(2, '0');
                const mm = String(hoje.getMonth() + 1).padStart(2, '0');
                const aaaa = hoje.getFullYear();
                const dataFormatada = `${dd}/${mm}/${aaaa}`;
                document.getElementById('data_1').value = dataFormatada;
                document.getElementById('data_2').value = dataFormatada;
                localStorage.setItem('data', dataFormatada);

                document.getElementById('responsavel_1').value = "SQF";
                document.getElementById('responsavel_2').value = "SQF";
                localStorage.setItem('responsavel', "SQF");

                // Restaura o tamanho original após limpar
                ajustarTamanhoFonteMotivo('');
            }
        }
    </script>
</body>
</html>
