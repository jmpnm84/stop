<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP v3.3.2</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffdc00">

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 15px 10px; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; overflow-x: hidden; }
        
        .actions { margin-bottom: 20px; display: flex; gap: 10px; width: 100%; max-width: 14cm; }
        .btn { background-color: #034263; color: white; border: none; padding: 14px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: background-color 0.2s; }
        .btn-clear { background-color: #d61c1c; }
        .btn-sync { background-color: #2196F3; }

        .a5-container { width: 14cm; max-width: 100%; height: 19.5cm; background-color: #ffffff; border: 8px solid #ffdc00; padding: 8mm 7mm; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: center; margin-bottom: 6mm; }
        .logo-image { height: 42px; object-fit: contain; }

        .stop-box { border: 2px dashed #333333; padding: 15px; text-align: center; margin: 0 auto 8mm auto; width: 100%; max-width: 9.5cm; height: 5.2cm; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .stop-sign { width: 75px; height: 75px; background-color: #7f7f7f; clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); display: flex; justify-content: center; align-items: center; border: 3px solid #ffffff; }
        .stop-text { color: #ffffff; font-size: 26px; font-weight: bold; }
        .nao-usar { color: #d61c1c; font-size: 22px; font-weight: bold; margin-top: 5px; }

        .field-row { display: flex; align-items: center; margin-bottom: 5mm; width: 100%; justify-content: center; }
        .form-label { font-size: 18px; font-weight: bold; margin-right: 10px; }
        .form-input { border: none; border-bottom: 2px solid #000000; font-size: 18px; font-weight: bold; padding: 2px 5px; background: transparent; outline: none; text-align: center; width: 100%; }
        
        .form-row { display: flex; justify-content: center; width: 100%; margin-bottom: 5mm; }
        
        .form-group-block { display: flex; flex-direction: column; margin-bottom: 5mm; width: 100%; }
        .form-label-block { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 5px; }
        
        /* Campo ajustável */
        [contenteditable] { 
            border-bottom: 2px solid #000000; font-size: 24px; font-weight: bold; min-height: 45px; 
            text-align: center; color: #d61c1c; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        .observacoes-wrapper { margin-top: auto; }
        
        @media print { .actions { display: none !important; } }
    </style>
</head>
<body>
    <div class="actions">
        <button class="btn btn-clear" onclick="location.reload()">Limpar</button>
        <button class="btn" onclick="window.print()">Imprimir</button>
    </div>

    <div class="a5-container">
        <div class="header"><img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image"></div>
        <div class="stop-box"><div class="stop-sign"><span class="stop-text">STOP</span></div><div class="nao-usar">NÃO USAR</div></div>
        
        <div class="field-row"><label class="form-label">Ref.:</label><input type="text" class="form-input" style="width: 200px;"></div>
        <div class="field-row"><label class="form-label">Peças:</label><input type="text" class="form-input" style="width: 200px;"></div>
        
        <div class="form-row">
            <div class="field-row" style="width: auto; margin-right: 20px;"><label class="form-label">Qtd:</label><input type="text" class="form-input" style="width: 80px;"></div>
            <div class="field-row" style="width: auto;"><label class="form-label">Data:</label><input type="text" id="data_1" class="form-input" style="width: 150px;" placeholder="DD/MM/AAAA"></div>
        </div>
        
        <div class="field-row"><label class="form-label">Resp.:</label><input type="text" class="form-input" value="SQF" style="width: 200px;"></div>
        
        <div class="form-group-block">
            <label class="form-label-block">Motivo:</label>
            <div id="motivo_1" contenteditable="true" oninput="ajustarFonte(this)"></div>
        </div>
        
        <div class="form-group-block observacoes-wrapper">
            <label class="form-label-block">Obs.:</label>
            <div contenteditable="true" style="color: #000; font-size: 18px;"></div>
        </div>
    </div>

    <script>
        // Formatar Data
        document.getElementById('data_1').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.substring(0, 8);
            if (v.length >= 5) e.target.value = v.replace(/(\d{2})(\d{2})(\d{1,4})/, '$1/$2/$3');
            else if (v.length > 2) e.target.value = v.replace(/(\d{2})(\d{1,2})/, '$1/$2');
            else e.target.value = v;
        });

        // Ajuste dinâmico de fonte
        function ajustarFonte(el) {
            let fontSize = 24;
            el.style.fontSize = fontSize + "px";
            while (el.scrollHeight > el.clientHeight && fontSize > 12) {
                fontSize--;
                el.style.fontSize = fontSize + "px";
            }
        }
    </script>
</body>
</html>
