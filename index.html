<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#ffdc00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 10px;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Floating Digital Control Buttons */
        .actions {
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
        }
        .btn {
            background-color: #034263;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-clear {
            background-color: #d61c1c;
        }

        /* Container que junta os dois blocos lado a lado */
        .print-page {
            display: flex;
            gap: 10mm;
            justify-content: center;
            background-color: transparent;
        }

        /* Custom Dimensions: 14cm x 19.5cm */
        .a5-container {
            width: 14cm;
            height: 19.5cm;
            background-color: #ffffff;
            border: 8px solid #ffdc00;
            padding: 12mm 8mm;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }
        
        /* Logo Header Area */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 6mm;
        }
        .logo-image {
            height: 45px;
            max-width: 100%;
            object-fit: contain;
        }

        /* STOP Box - Alterado para 9cm de largura e 6cm de altura */
        .stop-box {
            border: 2px dashed #333333;
            padding: 12px;
            text-align: center;
            margin: 0 auto 6mm auto;
            width: 9cm;
            height: 6cm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .stop-sign {
            width: 70px;
            height: 70px;
            background-color: #7f7f7f;
            position: relative;
            margin: 0 auto 8px auto;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #ffffff;
            outline: 2px solid #7f7f7f;
            flex-shrink: 0;
        }
        .stop-text {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nao-usar {
            color: #d61c1c;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 3px 0 0 0;
        }

        /* Form Fields Layout */
        .form-group {
            display: flex;
            align-items: flex-end;
            margin-bottom: 7mm;
            width: 100%;
        }
        .form-label {
            font-size: 14px;
            font-weight: normal;
            color: #000000;
            white-space: nowrap;
            margin-right: 8px;
            padding-bottom: 2px;
        }
        .form-input {
            flex-grow: 1;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 14px;
            padding: 2px 5px;
            background: transparent;
            outline: none;
            color: #333333;
            text-align: center;
        }
        .form-input:focus {
            background-color: #fffde7;
        }
        
        /* AJUSTE AQUI: Redução do campo visual da data e alinhamento à esquerda */
        #data_1, #data_2 {
            text-align: left;
            max-width: 90px; 
            flex-grow: 0; /* Impede que o campo estique desnecessariamente */
        }
        
        /* Quantity and Date Alignment */
        .form-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 7mm;
        }
        .form-row .form-group {
            margin-bottom: 0;
        }
        .form-row .form-group:first-child {
            width: 52%;
        }
        .form-row .form-group:last-child {
            width: 38%;
            justify-content: flex-start; /* Garante que o conjunto Label + Input fique arrumado */
        }

        /* Textareas */
        .form-block {
            display: flex;
            flex-direction: column;
            margin-bottom: 6mm;
        }
        .form-block.expandable {
            margin-bottom: 0;
        }
        .form-block .form-label {
            margin-bottom: 6px;
        }
        .form-textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            background: transparent;
            padding: 2px 5px;
            text-align: center;
        }
        
        /* Print Styles */
        @media print {
            @page {
                size: A4 landscape;
                margin: 5mm;
            }
            body {
                background-color: #ffffff;
                padding: 0;
                display: block;
            }
            .print-page {
                gap: 8mm;
            }
            .a5-container {
                box-shadow: none;
                border: 8px solid #ffdc00 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .actions {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn btn-clear" onclick="clearForm()">Limpar Campos</button>
        <button class="btn" onclick="window.print()">Imprimir / Guardar PDF (A4 Paisagem)</button>
    </div>

    <div class="print-page">
        
        <div class="a5-container">
            <div class="header">
                <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
            </div>
            <div class="stop-box">
                <div class="stop-sign"><span class="stop-text">STOP</span></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            <div class="form-group">
                <label class="form-label">Ref.:</label>
                <input type="text" id="ref_1" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Peças:</label>
                <input type="text" id="pecas_1" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Quantidade:</label>
                    <input type="text" id="quantidade_1" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Data:</label>
                    <input type="text" id="data_1" class="form-input" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Responsável:</label>
                <input type="text" id="responsavel_1" class="form-input">
            </div>
            <div class="form-block">
                <label class="form-label">Motivo:</label>
                <textarea id="motivo_1" class="form-textarea" style="min-height: 45px;"></textarea>
            </div>
            <div class="form-block expandable">
                <label class="form-label">Observações:</label>
                <textarea id="observacoes_1" class="form-textarea" style="min-height: 45px; height: 45px;"></textarea>
            </div>
        </div>

        <div class="a5-container">
            <div class="header">
                <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
            </div>
            <div class="stop-box">
                <div class="stop-sign"><span class="stop-text">STOP</span></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            <div class="form-group">
                <label class="form-label">Ref.:</label>
                <input type="text" id="ref_2" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Peças:</label>
                <input type="text" id="pecas_2" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Quantidade:</label>
                    <input type="text" id="quantidade_2" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Data:</label>
                    <input type="text" id="data_2" class="form-input" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Responsável:</label>
                <input type="text" id="responsavel_2" class="form-input">
            </div>
            <div class="form-block">
                <label class="form-label">Motivo:</label>
                <textarea id="motivo_2" class="form-textarea" style="min-height: 45px;"></textarea>
            </div>
            <div class="form-block expandable">
                <label class="form-label">Observações:</label>
                <textarea id="observacoes_2" class="form-textarea" style="min-height: 45px; height: 45px;"></textarea>
            </div>
        </div>

    </div>

    <script>
        const baseFields = ['ref', 'pecas', 'quantidade', 'data', 'responsavel', 'motivo', 'observacoes'];
        
        function formatarData(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v.length > 8) v = v.substring(0, 8);
            
            if (v.length > 4) {
                v = v.replace(/^(\d{2})(\d{2})(\d{4})$/, '$1/$2/$3');
            } else if (v.length > 2) {
                v = v.replace(/^(\d{2})(\d{1,2})$/, '$1/$2');
            }
            return v;
        }

        window.addEventListener('load', () => {
            baseFields.forEach(fieldId => {
                const savedValue = localStorage.getItem(fieldId);
                
                [1, 2].forEach(num => {
                    const el = document.getElementById(`${fieldId}_${num}`);
                    if (savedValue) el.value = savedValue;
                    
                    el.addEventListener('input', (e) => {
                        let val = e.target.value;
                        
                        if (fieldId === 'data') {
                            val = formatarData(e.target);
                            e.target.value = val;
                        }

                        localStorage.setItem(fieldId, val);
                        
                        const otherNum = num === 1 ? 2 : 1;
                        document.getElementById(`${fieldId}_${otherNum}`).value = val;
                    });
                });
            });
            
            const date1 = document.getElementById('data_1');
            if (!date1.value) {
                const hoje = new Date();
                const dd = String(hoje.getDate()).padStart(2, '0');
                const mm = String(hoje.getMonth() + 1).padStart(2, '0');
                const aaaa = hoje.getFullYear();
                const dataFormatada = `${dd}/${mm}/${aaaa}`;
                
                document.getElementById('data_1').value = dataFormatada;
                document.getElementById('data_2').value = dataFormatada;
                localStorage.setItem('data', dataFormatada);
            }
        });

        function clearForm() {
            if(confirm("Tem a certeza que deseja limpar todos os campos?")) {
                baseFields.forEach(fieldId => {
                    localStorage.removeItem(fieldId);
                    document.getElementById(`${fieldId}_1`).value = '';
                    document.getElementById(`${fieldId}_2`).value = '';
                });
                const hoje = new Date();
                const dd = String(hoje.getDate()).padStart(2, '0');
                const mm = String(hoje.getMonth() + 1).padStart(2, '0');
                const aaaa = hoje.getFullYear();
                const dataFormatada = `${dd}/${mm}/${aaaa}`;
                
                document.getElementById('data_1').value = dataFormatada;
                document.getElementById('data_2').value = dataFormatada;
                localStorage.setItem('data', dataFormatada);
            }
        }
    </script>
</body>
</html>
