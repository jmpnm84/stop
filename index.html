<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP v3.3.2</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffdc00">

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 15px 10px; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; overflow-x: hidden; }
        
        .actions { margin-bottom: 20px; display: flex; gap: 10px; width: 100%; max-width: 14cm; }
        .btn { background-color: #034263; color: white; border: none; padding: 14px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: background-color 0.2s; }
        
        .print-page { display: flex; gap: 10mm; justify-content: center; align-items: center; width: 100%; }
        .a5-container { width: 14cm; max-width: 100%; height: 19.5cm; background-color: #ffffff; border: 8px solid #ffdc00; padding: 8mm 7mm; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        
        /* Layout de separação para evitar sublinhado no texto */
        .form-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-bottom: 4.5mm; gap: 5px; }
        .field-container { display: flex; align-items: flex-end; flex: 1; }
        .form-label { font-size: 14px; color: #000000; margin-right: 5px; margin-bottom: 0; }
        .form-input { flex: 1; border: none; border-bottom: 1px solid #000000; font-size: 14px; padding: 2px; background: transparent; outline: none; color: #333333; text-align: center; }

        .form-group-inline { display: flex; align-items: flex-end; margin-bottom: 4.5mm; width: 100%; }
        .form-group-block { display: flex; flex-direction: column; margin-bottom: 4.5mm; width: 100%; }
        .form-textarea { width: 100%; border: none; border-bottom: 1px solid #000000; font-size: 14px; resize: none; outline: none; background: transparent; text-align: center; }

        #motivo_1, #motivo_2 { color: #d61c1c; font-weight: bold; font-size: 22px; }
        
        @media print {
            .actions { display: none !important; }
            .a5-container { border: 7px solid #ffdc00 !important; }
            input::placeholder { color: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn" onclick="window.print()">Imprimir</button>
    </div>

    <div class="print-page">
        <div class="a5-container" id="bloco1">
            <div class="form-row">
                <div class="field-container"><label class="form-label">Qtd:</label><input type="text" id="quantidade_1" class="form-input"></div>
                <div class="field-container"><label class="form-label">Data:</label><input type="text" id="data_1" class="form-input" placeholder="DD/MM/AAAA" maxlength="10"></div>
            </div>
            </div>
    </div>

    <script>
        function formatarData(value) {
            let v = value.replace(/\D/g, ''); 
            if (v.length > 8) v = v.substring(0, 8);
            if (v.length >= 5) return v.replace(/(\d{2})(\d{2})(\d{1,4})/, '$1/$2/$3');
            else if (v.length > 2) return v.replace(/(\d{2})(\d{1,2})/, '$1/$2');
            return v;
        }

        document.getElementById('data_1').addEventListener('input', (e) => {
            e.target.value = formatarData(e.target.value);
        });
    </script>
</body>
</html>
