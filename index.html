<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP Tablet v3.3.0</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffdc00">

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 20px; background-color: #e0e0e0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }
        
        /* Layout Tablet Otimizado */
        .actions { margin-bottom: 30px; display: flex; gap: 15px; width: 100%; max-width: 16cm; }
        .btn { 
            background-color: #034263; color: white; border: none; padding: 20px; 
            font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; flex: 1;
        }
        .btn-clear { background-color: #d61c1c; }
        .btn-sync { background-color: #2196F3; }

        .print-page { display: flex; gap: 20px; justify-content: center; width: 100%; }

        .a5-container {
            width: 16cm; height: 22.5cm; background-color: #ffffff;
            border: 10px solid #ffdc00; padding: 12mm; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }
        
        .clone-block { display: none; }
        
        .header { margin-bottom: 8mm; }
        .logo-image { height: 50px; }

        .stop-box { 
            border: 3px dashed #333; padding: 20px; text-align: center; 
            margin-bottom: 10mm; width: 100%; height: 6cm;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .stop-sign { width: 90px; height: 90px; background-color: #7f7f7f; border: 4px solid #fff; }
        .stop-text { font-size: 26px; }
        .nao-usar { font-size: 22px; }

        .form-group-inline { display: flex; align-items: flex-end; margin-bottom: 8mm; width: 100%; }
        .form-label { font-size: 18px; margin-right: 15px; }
        .form-input { 
            flex-grow: 1; border: none; border-bottom: 2px solid #000; 
            font-size: 18px; padding: 10px; text-align: center; background: transparent;
        }
        
        .form-group-block { display: flex; flex-direction: column; margin-bottom: 8mm; width: 100%; }
        .form-textarea { 
            width: 100%; border: none; border-bottom: 2px solid #000; 
            font-size: 18px; resize: none; text-align: center; padding: 10px;
        }

        #motivo_1, #motivo_2 { color: #d61c1c; font-weight: bold; font-size: 22px; }

        @media print {
            body { background: white; padding: 0; }
            .actions { display: none; }
            .a5-container { box-shadow: none; border: 8px solid #ffdc00 !important; }
            .clone-block { display: flex !important; }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn btn-clear" onclick="clearForm()">Limpar</button>
        <button class="btn btn-sync" onclick="importarDoDrive()">Sincronizar</button>
        <button class="btn" onclick="window.print()">Imprimir</button>
    </div>

    <div class="print-page">
        <div class="a5-container" id="bloco_1">
            <div class="header"><img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" class="logo-image"></div>
            <div class="stop-box">
                <div class="stop-sign"></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            
            <div class="form-group-inline"><label class="form-label">Ref.:</label><input type="text" id="ref_1" class="form-input"></div>
            <div class="form-group-inline"><label class="form-label">Peças:</label><input type="text" id="pecas_1" class="form-input"></div>
            <div class="form-group-inline"><label class="form-label">Qtd.:</label><input type="text" id="quantidade_1" class="form-input"></div>
            <div class="form-group-inline"><label class="form-label">Data:</label><input type="text" id="data_1" class="form-input" placeholder="DD/MM/AAAA"></div>
            <div class="form-group-inline"><label class="form-label">Resp.:</label><input type="text" id="responsavel_1" class="form-input" value="SQF"></div>
            
            <div class="form-group-block">
                <label class="form-label">Motivo:</label>
                <textarea id="motivo_1" class="form-textarea" rows="2" oninput="ajustarTamanho(this)"></textarea>
            </div>
        </div>

        <div class="a5-container clone-block" id="bloco_2">
            </div>
    </div>

    <script>
        function ajustarTamanho(el) {
            const len = el.value.length;
            let size = 22;
            if (len > 50) size = 14;
            else if (len > 30) size = 18;
            el.style.fontSize = size + "px";
            
            // Sincroniza com o clone na impressora
            const id = el.id.split('_')[0];
            const targetId = el.id.endsWith('1') ? id + '_2' : id + '_1';
            if(document.getElementById(targetId)) document.getElementById(targetId).value = el.value;
        }

        function clearForm() {
            if(confirm("Limpar tudo?")) {
                const inputs = document.querySelectorAll('input, textarea');
                inputs.forEach(i => { if(i.id !== 'responsavel_1' && i.id !== 'responsavel_2') i.value = ''; });
            }
        }
    </script>
</body>
</html>
