<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP v3.2.4</title>
    
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 15px 10px; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; overflow-x: hidden; }
        
        .actions { margin-bottom: 20px; display: flex; gap: 10px; width: 100%; max-width: 14cm; }
        .btn { background-color: #034263; color: white; border: none; padding: 14px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .a5-container { width: 14cm; max-width: 100%; height: 19.5cm; background-color: #ffffff; border: 8px solid #ffdc00; padding: 8mm 7mm; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        
        /* Ajuste de larguras para aproximar Data da esquerda */
        .form-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 4.5mm; gap: 5px; }
        
        .field-row { display: flex; align-items: flex-end; margin-bottom: 4.5mm; width: 100%; }
        
        /* Largura reduzida para Qtd */
        .field-row-qtd { display: flex; align-items: flex-end; width: 30%; }
        /* Largura ajustada para Data */
        .field-row-data { display: flex; align-items: flex-end; width: 60%; }
        
        .form-label { font-size: 14px; color: #000000; margin-right: 8px; white-space: nowrap; padding-bottom: 2px; }
        .form-input { flex-grow: 1; border: none; border-bottom: 1px solid #000000; font-size: 14px; padding: 2px 5px; background: transparent; outline: none; text-align: center; }
        
        .form-group-block { display: flex; flex-direction: column; margin-bottom: 4.5mm; width: 100%; }
        .form-textarea { width: 100%; border: none; border-bottom: 1px solid #000000; font-size: 14px; resize: none; outline: none; background: transparent; text-align: center; }

        @media print { .actions { display: none !important; } .a5-container { border: 7px solid #ffdc00 !important; } }
    </style>
</head>
<body>

    <div class="a5-container">
        <div class="field-row"><label class="form-label">Ref.:</label><input type="text" class="form-input"></div>
        <div class="field-row"><label class="form-label">Peças:</label><input type="text" class="form-input"></div>
        
        <div class="form-row">
            <div class="field-row-qtd"><label class="form-label">Qtd:</label><input type="text" class="form-input"></div>
            <div class="field-row-data"><label class="form-label">Data:</label><input type="text" class="form-input" placeholder="DD/MM/AAAA"></div>
        </div>
        
        <div class="field-row"><label class="form-label">Resp.:</label><input type="text" class="form-input"></div>
        </div>
</body>
</html>
