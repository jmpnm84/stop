<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIGO - STOP NÃO USAR (DUPLO A4)</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJidGkiOiIvIiwKICAibmFtZSI6IlRSSUdPIFNUT1AgTmFvIFVzYXIiLAogICJzaG9ydF9uYW1lIjoiU1RPUCIsCiAgInN0YXJ0X3VybCI6Ii4iLAogICJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiOiIjZmZkYzAwIiwKICAiaWNvbnMiOltdCn0=">
    
    <meta name="theme-color" content="#ffdc00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 15px 10px;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }
        
        .actions {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 14cm;
        }
        .btn {
            background-color: #034263;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }
        .btn-clear {
            background-color: #d61c1c;
        }

        .print-page {
            display: flex;
            gap: 10mm;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: transparent;
        }

        .a5-container {
            width: 14cm;
            max-width: 100%;
            height: 19.5cm;
            background-color: #ffffff;
            border: 8px solid #ffdc00;
            padding: 8mm 5mm;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }
        
        .clone-block {
            display: none;
        }
        
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 4mm;
        }
        .logo-image {
            height: 40px;
            max-width: 100%;
            object-fit: contain;
        }

        .stop-box {
            border: 2px dashed #333333;
            padding: 10px;
            text-align: center;
            margin: 0 auto 5mm auto;
            width: 100%;
            max-width: 9cm;
            height: 5.5cm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .stop-sign {
            width: 65px;
            height: 65px;
            background-color: #7f7f7f;
            position: relative;
            margin: 0 auto 6px auto;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #ffffff;
            outline: 2px solid #7f7f7f;
            flex-shrink: 0;
        }
        .stop-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nao-usar {
            color: #d61c1c;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 3px 0 0 0;
        }

        .form-group {
            display: flex;
            align-items: flex-end;
            margin-bottom: 5mm;
            width: 100%;
        }
        .form-label {
            font-size: 13px;
            font-weight: normal;
            color: #000000;
            white-space: nowrap;
            margin-right: 8px;
            padding-bottom: 2px;
        }
        .form-input {
            flex-grow: 1;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 13px;
            padding: 2px 5px;
            background: transparent;
            outline: none;
            color: #333333;
            text-align: center;
            min-width: 0;
        }
        .form-input:focus {
            background-color: #fffde7;
        }
        
        #data_1, #data_2 {
            text-align: center;
            max-width: 95px; 
            flex-grow: 1;
        }
        
        .form-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 5mm;
            gap: 10px;
        }
        .form-row .form-group {
            margin-bottom: 0;
        }
        .form-row .form-group:first-child {
            width: 55%;
        }
        .form-row .form-group:last-child {
            width: 45%;
            justify-content: flex-start;
        }

        .form-block {
            display: flex;
            flex-direction: column;
            margin-bottom: 4mm;
        }
        .form-block.expandable {
            margin-bottom: 0;
        }
        .form-block .form-label {
            margin-bottom: 4px;
        }
        .form-textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000000;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            background: transparent;
            padding: 2px 5px;
            text-align: center;
        }

        #motivo_1, #motivo_2 {
            color: #d61c1c;
            font-weight: bold;
        }
        
        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }
            body {
                background-color: #ffffff;
                padding: 5mm !important;
                margin: 0 !important;
                display: block;
                overflow: hidden !important;
                height: 100%;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .print-page {
                display: flex !important;
                gap: 8mm;
                align-items: flex-start;
                justify-content: center;
                page-break-inside: avoid;
                break-inside: avoid;
            }
            .a5-container {
                box-shadow: none;
                box-sizing: border-box !important;
                width: 14cm !important;
                max-width: 14cm !important;
                height: 18.5cm !important;
                border: 8px solid #ffdc00 !important;
                padding: 10mm 5mm !important;
            }
            .clone-block {
                display: flex !important;
            }
            .actions {
                display: none;
            }
            .header { margin-bottom: 5mm; }
            .stop-box { height: 5.2cm; margin-bottom: 5mm; }
            .form-group { margin-bottom: 6mm; }
            .form-row { margin-bottom: 6mm; }
            .form-block { margin-bottom: 5mm; }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn btn-clear" onclick="clearForm()">Limpar Campos</button>
        <button class="btn" onclick="window.print()">Imprimir / Guardar PDF (A4 Paisagem)</button>
    </div>

    <datalist id="listaReferencias"></datalist>

    <div class="print-page">
        
        <div class="a5-container">
            <div class="header">
                <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
            </div>
            <div class="stop-box">
                <div class="stop-sign"><span class="stop-text">STOP</span></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            <div class="form-group">
                <label class="form-label">Ref.:</label>
                <input type="text" id="ref_1" class="form-input" list="listaReferencias" autocomplete="off" placeholder="Digite p/ pesquisar...">
            </div>
            <div class="form-group">
                <label class="form-label">Peças:</label>
                <input type="text" id="pecas_1" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Quantidade:</label>
                    <input type="text" id="quantidade_1" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Data:</label>
                    <input type="text" id="data_1" class="form-input" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Responsável:</label>
                <input type="text" id="responsavel_1" class="form-input">
            </div>
            <div class="form-block">
                <label class="form-label">Motivo:</label>
                <textarea id="motivo_1" class="form-textarea" style="min-height: 40px;"></textarea>
            </div>
            <div class="form-block expandable">
                <label class="form-label">Observações:</label>
                <textarea id="observacoes_1" class="form-textarea" style="min-height: 40px; height: 40px;"></textarea>
            </div>
        </div>

        <div class="a5-container clone-block">
            <div class="header">
                <img src="https://github.com/user-attachments/assets/815f6b76-e6c4-47eb-b8e2-476dea6c4d06" alt="Logo" class="logo-image">
            </div>
            <div class="stop-box">
                <div class="stop-sign"><span class="stop-text">STOP</span></div>
                <div class="nao-usar">NÃO USAR</div>
            </div>
            <div class="form-group">
                <label class="form-label">Ref.:</label>
                <input type="text" id="ref_2" class="form-input" list="listaReferencias" autocomplete="off" placeholder="Digite p/ pesquisar...">
            </div>
            <div class="form-group">
                <label class="form-label">Peças:</label>
                <input type="text" id="pecas_2" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Quantidade:</label>
                    <input type="text" id="quantidade_2" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Data:</label>
                    <input type="text" id="data_2" class="form-input" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Responsável:</label>
                <input type="text" id="responsavel_2" class="form-input">
            </div>
            <div class="form-block">
                <label class="form-label">Motivo:</label>
                <textarea id="motivo_2" class="form-textarea" style="min-height: 40px;"></textarea>
            </div>
            <div class="form-block expandable">
                <label class="form-label">Observações:</label>
                <textarea id="observacoes_2" class="form-textarea" style="min-height: 40px; height: 40px;"></textarea>
            </div>
        </div>

    </div>

    <script>
        let mapaProdutos = [];
        
        // O URL do seu Apps Script associado
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfoytX-8eOYURVuGhqgUX6CcTko4k8mFZ8i_dqD51nIbsP_KDK5gmT3lcaIx6V3mg/exec";

        const baseFields = ['ref', 'pecas', 'quantidade', 'data', 'responsavel', 'motivo', 'observacoes'];
        
        function formatarData(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v.length > 8) v = v.substring(0, 8);
            if (v.length > 4) {
                v = v.replace(/^(\d{2})(\d{2})(\d{4})$/, '$1/$2/$3');
            } else if (v.length > 2) {
                v = v.replace(/^(\d{2})(\d{1,2})$/, '$1/$2');
            }
            return v;
        }

        function verificarFiltroReferencia(valorDigitado) {
            const correspondencia = mapaProdutos.find(p => String(p.referencia).trim() === String(valorDigitado).trim());
            if (correspondencia) {
                document.getElementById('pecas_1').value = correspondencia.nomePeca;
                document.getElementById('pecas_2').value = correspondencia.nomePeca;
                localStorage.setItem('pecas', correspondencia.nomePeca);
            }
        }

        window.addEventListener('load', () => {
            carregarDadosDoScript();

            baseFields.forEach(fieldId => {
                const savedValue = localStorage.getItem(fieldId);
                [1, 2].forEach(num => {
                    const el = document.getElementById(`${fieldId}_${num}`);
                    if (savedValue && el) el.value = savedValue;
                    
                    if (el) {
                        el.addEventListener('input', (e) => {
                            let val = e.target.value;
                            if (fieldId === 'data') {
                                val = formatarData(e.target);
                                e.target.value = val;
                            }
                            
                            localStorage.setItem(fieldId, val);
                            const otherNum = num === 1 ? 2 : 1;
                            const otherEl = document.getElementById(`${fieldId}_${otherNum}`);
                            if (otherEl) otherEl.value = val;

                            if (fieldId === 'ref') {
                                verificarFiltroReferencia(val);
                            }
                        });
                    }
                });
            });
            
            const date1 = document.getElementById('data_1');
            if (date1 && !date1.value) {
                const hoje = new Date();
                const dd = String(hoje.getDate()).padStart(2, '0');
                const mm = String(hoje.getMonth() + 1).padStart(2, '0');
                const aaaa = hoje.getFullYear();
                const dataFormatada = `${dd}/${mm}/${aaaa}`;
                document.getElementById('data_1').value = dataFormatada;
                document.getElementById('data_2').value = dataFormatada;
                localStorage.setItem('data', dataFormatada);
            }
        });

        // Carrega dados diretamente via API Fetch de forma segura
        function carregarDadosDoScript() {
            fetch(SCRIPT_URL)
                .then(response => {
                    if (!response.ok) throw new Error('Network response error');
                    return response.json();
                })
                .then(dados => {
                    if (Array.isArray(dados)) {
                        carregarDatalist(dados);
                    } else {
                        console.error("Dados inválidos recebidos da tabela:", dados);
                    }
                })
                .catch(err => console.error("Ligação interrompida ou CORS ativo no Script:", err));
        }

        function carregarDatalist(dados) {
            mapaProdutos = dados;
            const dl = document.getElementById('listaReferencias');
            dl.innerHTML = ''; 

            dados.forEach(item => {
                if (item.referencia) {
                    const opt = document.createElement('option');
                    opt.value = item.referencia;
                    opt.textContent = item.nomePeca ? item.nomePeca : ""; 
                    dl.appendChild(opt);
                }
            });
        }

        function clearForm() {
            if(confirm("Tem a certeza que deseja limpar todos os campos?")) {
                baseFields.forEach(fieldId => {
                    localStorage.removeItem(fieldId);
                    const e1 = document.getElementById(`${fieldId}_1`);
                    const e2 = document.getElementById(`${fieldId}_2`);
                    if (e1) e1.value = '';
                    if (e2) e2.value = '';
                });
                const hoje = new Date();
                const dd = String(hoje.getDate()).padStart(2, '0');
                const mm = String(hoje.getMonth() + 1).padStart(2, '0');
                const aaaa = hoje.getFullYear();
                const dataFormatada = `${dd}/${mm}/${aaaa}`;
                document.getElementById('data_1').value = dataFormatada;
                document.getElementById('data_2').value = dataFormatada;
                localStorage.setItem('data', dataFormatada);
            }
        }
    </script>
</body>
</html>
