<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigo - STOP v3.3.2</title>
    
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 15px 10px; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; }
        
        .a5-container { width: 14cm; max-width: 100%; height: 19.5cm; background-color: #ffffff; border: 8px solid #ffdc00; padding: 8mm 7mm; position: relative; display: flex; flex-direction: column; }
        
        /* Estilo visual com fonte maior e negrito */
        .field-row { display: flex; align-items: flex-end; margin-bottom: 5mm; width: 100%; }
        .form-label { font-size: 18px; font-weight: bold; color: #000000; margin-right: 10px; white-space: nowrap; }
        .form-input { flex-grow: 1; border: none; border-bottom: 2px solid #000000; font-size: 18px; font-weight: bold; padding: 2px 5px; background: transparent; outline: none; text-align: center; }
        
        .form-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 5mm; gap: 15px; }
        .form-row .field-row { margin-bottom: 0; }

        .form-group-block { display: flex; flex-direction: column; margin-bottom: 5mm; width: 100%; }
        .form-label-block { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .form-textarea { width: 100%; border: none; border-bottom: 2px solid #000000; font-size: 18px; font-weight: bold; resize: none; outline: none; background: transparent; text-align: center; }

        .stop-box { border: 2px dashed #333333; padding: 10px; text-align: center; margin: 0 auto 5mm auto; width: 100%; max-width: 9.5cm; }
        .stop-text { font-size: 26px; font-weight: bold; }
        .nao-usar { font-size: 22px; font-weight: bold; color: #d61c1c; }

        @media print { .actions { display: none !important; } }
    </style>
</head>
<body>
    <div class="a5-container">
        <div class="stop-box">
            <div class="stop-text">STOP</div>
            <div class="nao-usar">NÃO USAR</div>
        </div>
        
        <div class="field-row"><label class="form-label">Ref.:</label><input type="text" class="form-input"></div>
        <div class="field-row"><label class="form-label">Peças:</label><input type="text" class="form-input"></div>
        
        <div class="form-row">
            <div class="field-row"><label class="form-label">Qtd:</label><input type="text" class="form-input"></div>
            <div class="field-row"><label class="form-label">Data:</label><input type="text" class="form-input" placeholder="DD/MM/AAAA"></div>
        </div>
        
        <div class="field-row"><label class="form-label">Resp.:</label><input type="text" class="form-input"></div>
        
        <div class="form-group-block">
            <label class="form-label-block">Motivo:</label>
            <textarea class="form-textarea" style="min-height: 50px;"></textarea>
        </div>
    </div>
</body>
</html>
